# Postman export reminder:
# Postman -> Collection -> Export -> Collection v2.1 -> save as docs/postman_collection.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run tests
        run: mvn clean test

      - name: Success message
        if: success()
        run: echo "All tests passed!"
